<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Tab</title>
  <style>
    :root {
      --bg: #0f0f23;
      --bg2: #1a1a35;
      --accent: #6c63ff;
      --accent2: #8b7cf8;
      --text: rgba(255,255,255,0.9);
      --text2: rgba(255,255,255,0.55);
      --text3: rgba(255,255,255,0.3);
      --card-bg: rgba(255,255,255,0.05);
      --card-border: rgba(255,255,255,0.08);
      --card-hover: rgba(255,255,255,0.09);
      --input-bg: rgba(255,255,255,0.07);
      --input-border: rgba(255,255,255,0.1);
      --input-focus: rgba(108,99,255,0.5);
      --radius: 14px;
      --font: 'Inter', 'Segoe UI', system-ui, sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    /* Animated background gradient */
    .bg-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      pointer-events: none;
      animation: float 8s ease-in-out infinite;
    }

    .bg-orb-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #6c63ff, transparent);
      top: -100px; left: -100px;
      animation-delay: 0s;
    }

    .bg-orb-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #8b7cf8, transparent);
      bottom: -80px; right: -80px;
      animation-delay: -4s;
    }

    .bg-orb-3 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, #a78bfa, transparent);
      top: 30%; left: 60%;
      animation-delay: -2s;
      opacity: 0.08;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(20px, -30px) scale(1.05); }
      66% { transform: translate(-15px, 20px) scale(0.97); }
    }

    /* Main container */
    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
      width: 100%;
      max-width: 700px;
      padding: 40px 24px;
    }

    /* Time & Greeting */
    .time-section {
      text-align: center;
    }

    .time-display {
      font-size: 72px;
      font-weight: 300;
      color: var(--text);
      letter-spacing: -2px;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 0 40px rgba(108,99,255,0.3);
    }

    .date-display {
      font-size: 14px;
      color: var(--text2);
      margin-top: 8px;
      font-weight: 400;
      letter-spacing: 0.02em;
    }

    .greeting {
      font-size: 18px;
      color: var(--text2);
      margin-top: 6px;
      font-weight: 400;
    }

    /* Search bar */
    .search-section {
      width: 100%;
      max-width: 580px;
    }

    .search-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .search-icon {
      position: absolute;
      left: 18px;
      color: var(--text3);
      pointer-events: none;
      display: flex;
      align-items: center;
      transition: color 0.2s ease;
    }

    .search-wrapper:focus-within .search-icon {
      color: var(--accent2);
    }

    .search-input {
      width: 100%;
      background: var(--input-bg);
      border: 1.5px solid var(--input-border);
      border-radius: 50px;
      padding: 16px 20px 16px 50px;
      font-size: 15px;
      color: var(--text);
      font-family: var(--font);
      outline: none;
      transition: all 0.25s ease;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .search-input::placeholder {
      color: var(--text3);
    }

    .search-input:focus {
      background: rgba(255,255,255,0.1);
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(108,99,255,0.15),
                  0 4px 24px rgba(108,99,255,0.2);
    }

    /* Quick links */
    .quicklinks-section {
      width: 100%;
    }

    .quicklinks-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text3);
      margin-bottom: 14px;
      text-align: center;
    }

    .quicklinks-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    @media (max-width: 500px) {
      .quicklinks-grid { grid-template-columns: repeat(3, 1fr); }
    }

    .quicklink {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 16px 10px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      cursor: pointer;
      text-decoration: none;
      color: var(--text2);
      transition: all 0.2s ease;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    .quicklink:hover {
      background: var(--card-hover);
      border-color: rgba(108,99,255,0.3);
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.3),
                  0 0 0 1px rgba(108,99,255,0.15);
      color: var(--text);
    }

    .quicklink:active {
      transform: translateY(-1px);
    }

    .quicklink-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      background: rgba(255,255,255,0.08);
      transition: background 0.2s ease;
    }

    .quicklink:hover .quicklink-icon {
      background: rgba(255,255,255,0.12);
    }

    .quicklink-label {
      font-size: 11.5px;
      font-weight: 500;
      text-align: center;
      line-height: 1.2;
    }

    /* Bottom bar */
    .bottom-bar {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text3);
      z-index: 10;
    }

    .bottom-bar span {
      opacity: 0.7;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>
  <!-- Background orbs -->
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>

  <div class="container">
    <!-- Time section -->
    <div class="time-section">
      <div class="time-display" id="timeDisplay">00:00</div>
      <div class="date-display" id="dateDisplay">Loading...</div>
      <div class="greeting" id="greetingText">Good morning</div>
    </div>

    <!-- Search bar -->
    <div class="search-section">
      <div class="search-wrapper">
        <div class="search-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/>
            <path d="m21 21-4.35-4.35"/>
          </svg>
        </div>
        <input
          type="text"
          class="search-input"
          id="searchInput"
          placeholder="Search the web or enter a URL..."
          autocomplete="off"
          spellcheck="false"
          autofocus
        />
      </div>
    </div>

    <!-- Quick links -->
    <div class="quicklinks-section">
      <div class="quicklinks-label">Quick Links</div>
      <div class="quicklinks-grid" id="quicklinksGrid">
        <!-- Populated by JS -->
      </div>
    </div>
  </div>

  <div class="bottom-bar">
    <span>Arc Browser</span>
    <span>·</span>
    <span id="tabCountDisplay">1 tab open</span>
  </div>

  <script>
    const quicklinks = [
      { label: 'Google', url: 'https://www.google.com', emoji: '🔍', color: '#4285F4' },
      { label: 'GitHub', url: 'https://github.com', emoji: '🐙', color: '#24292e' },
      { label: 'YouTube', url: 'https://www.youtube.com', emoji: '▶️', color: '#FF0000' },
      { label: 'Reddit', url: 'https://www.reddit.com', emoji: '🤖', color: '#FF4500' },
      { label: 'Wikipedia', url: 'https://www.wikipedia.org', emoji: '📚', color: '#636363' },
      { label: 'Hacker News', url: 'https://news.ycombinator.com', emoji: '🔥', color: '#FF6600' },
      { label: 'Twitter/X', url: 'https://twitter.com', emoji: '🐦', color: '#1DA1F2' },
      { label: 'Gmail', url: 'https://mail.google.com', emoji: '✉️', color: '#EA4335' },
    ];

    // Render quick links
    const grid = document.getElementById('quicklinksGrid');
    quicklinks.forEach(link => {
      const a = document.createElement('a');
      a.className = 'quicklink';
      a.href = link.url;
      a.innerHTML = `
        <div class="quicklink-icon">${link.emoji}</div>
        <span class="quicklink-label">${link.label}</span>
      `;
      a.addEventListener('click', (e) => {
        e.preventDefault();
        window.location.href = link.url;
      });
      grid.appendChild(a);
    });

    // Clock
    function updateClock() {
      const now = new Date();
      const hours = now.getHours().toString().padStart(2, '0');
      const minutes = now.getMinutes().toString().padStart(2, '0');
      document.getElementById('timeDisplay').textContent = `${hours}:${minutes}`;

      const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
      const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      const day = days[now.getDay()];
      const month = months[now.getMonth()];
      const date = now.getDate();
      const year = now.getFullYear();
      document.getElementById('dateDisplay').textContent = `${day}, ${month} ${date}, ${year}`;

      const h = now.getHours();
      let greeting = 'Good morning';
      if (h >= 12 && h < 17) greeting = 'Good afternoon';
      else if (h >= 17 && h < 21) greeting = 'Good evening';
      else if (h >= 21 || h < 5) greeting = 'Good night';
      document.getElementById('greetingText').textContent = greeting;
    }

    updateClock();
    setInterval(updateClock, 1000);

    // Search
    const searchInput = document.getElementById('searchInput');
    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const val = searchInput.value.trim();
        if (!val) return;
        let url;
        if (/^(https?:\/\/)/.test(val)) {
          url = val;
        } else if (/^[a-zA-Z0-9-]+\.[a-zA-Z]{2,}(\/.*)?$/.test(val) && !val.includes(' ')) {
          url = 'https://' + val;
        } else {
          url = 'https://www.google.com/search?q=' + encodeURIComponent(val);
        }
        window.location.href = url;
      }
    });

    // Focus search on load
    window.addEventListener('load', () => {
      setTimeout(() => searchInput.focus(), 100);
    });
  </script>
</body>
</html>
